<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CleanTube</title>
    <style>
        :root { --bg: #0f0f0f; --text: #ffffff; --red: #ff0000; --card: #1e1e1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: #202020; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .logo { color: var(--red); font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .search-box { display: flex; flex-grow: 0.5; }
        input { width: 100%; padding: 10px; border: 1px solid #333; background: #000; color: #fff; border-radius: 20px 0 0 20px; outline: none; }
        button { padding: 0 20px; border: none; background: #333; color: white; border-radius: 0 20px 20px 0; cursor: pointer; }
        button:hover { background: #444; }

        /* Main Layout */
        main { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 200px; background: #0f0f0f; padding: 15px; border-right: 1px solid #333; font-size: 0.9rem; }
        #sidebar div { padding: 10px; cursor: pointer; border-radius: 8px; }
        #sidebar div:hover { background: #2a2a2a; }

        /* Video Area */
        #content-area { flex-grow: 1; padding: 20px; overflow-y: auto; }
        iframe { width: 100%; height: 80vh; border: none; border-radius: 12px; background: #000; }
        
        /* Message */
        .status { margin-bottom: 10px; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">CleanTube</a>
    <div class="search-box">
        <input type="text" id="q" placeholder="Search for videos (Shorts-free)...">
        <button onclick="updateView()">Search</button>
    </div>
    <div style="width: 50px;"></div>
</header>

<main>
    <div id="sidebar">
        <div onclick="setFeed('trending')">🔥 Trending</div>
        <div onclick="setFeed('music')">🎵 Music</div>
        <div onclick="setFeed('gaming')">🎮 Gaming</div>
        <div onclick="setFeed('news')">📰 News</div>
    </div>

    <div id="content-area">
        <div class="status" id="statusText">Showing: Trending</div>
        <iframe id="viewer" src="https://www.youtube.com/embed?listType=search&list=trending"></iframe>
    </div>
</main>

<script>
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('statusText');

    function updateView() {
        const query = document.getElementById('q').value;
        if (query) {
            viewer.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}`;
            status.innerText = `Search results for: ${query}`;
        }
    }

    function setFeed(type) {
        viewer.src = `https://www.youtube.com/embed?listType=search&list=${type}`;
        status.innerText = `Showing: ${type.charAt(0).toUpperCase() + type.slice(1)}`;
    }

    // Allow "Enter" key to search
    document.getElementById('q').addEventListener("keypress", function(event) {
        if (event.key === "Enter") updateView();
    });
</script>

</body>
</html>
